# Gate A research — manual trigger (research is a decision, not a schedule).
name: research

on:
  workflow_dispatch:
    inputs:
      book:
        description: "Book to research (empty = all)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: ledger-writes
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests -q
      - name: Run research
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ github.event.inputs.book }}" ]; then
            python run_research.py --book "${{ github.event.inputs.book }}"
          else
            python run_research.py
          fi
          python run_status.py
      - name: Commit verdicts
        run: |
          git config user.name "edgelab-bot"
          git config user.email "actions@users.noreply.github.com"
          git add ledger/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "research: gate A verdicts $(date -u +'%Y-%m-%d')"
            git pull --rebase origin master || true
            git push
          fi


