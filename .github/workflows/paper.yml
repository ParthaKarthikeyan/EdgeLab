# EdgeLab paper runner — every active book, hourly.
# Crypto trades 24/7; the runner is stateless and idempotent per hour.
name: paper

on:
  schedule:
    - cron: "7 * * * *"        # hourly at :07 (offset avoids top-of-hour congestion)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ledger-writes         # research + paper share the ledger dir; serialize
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run paper books
        env:
          PYTHONUNBUFFERED: "1"
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          OANDA_API_KEY: ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python run_paper.py
          python run_status.py
      - name: Commit ledgers
        run: |
          git config user.name "edgelab-bot"
          git config user.email "actions@users.noreply.github.com"
          git add ledger/
          if git diff --cached --quiet; then
            echo "no ledger changes"
          else
            git commit -m "paper: ledger update $(date -u +'%Y-%m-%d %H:%M')"
            for i in 1 2 3; do
              git pull --rebase origin master && git push && break
              echo "push attempt $i failed; retrying"
              sleep $((i * 5))
            done
          fi


