# Gate A research for the QQQ 1-DTE condor — needs Alpaca data keys, so it
# runs here rather than locally. Manual trigger: research is a decision.
name: condor research

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ledger-writes
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests -q
      - name: Run condor research
        env:
          PYTHONUNBUFFERED: "1"
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python run_condor_research.py
          python run_status.py
      - name: Commit verdicts
        run: |
          git config user.name "edgelab-bot"
          git config user.email "actions@users.noreply.github.com"
          git add ledger/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "research: condor gate A verdict $(date -u +'%Y-%m-%d')"
            git pull --rebase origin master || true
            git push
          fi
